# config for running aplsonic inside docker compose.
# hostnames are the compose service names, not localhost.
database:
  host: tidb
  port: 4000
  user: root
  password:
  database: test

port: 4533
web_port: 4534
sync_on_search: false
download: "getAlbum"

storage:
  endpoint: versitygw:7070
  region: us-east-1
  access_key: aplsonic
  secret_key: aplsonic-secret
  bucket: aplsonic-music
  use_ssl: false
  download_codec: aac-web

token_check_hours: 6
token_warn_days: 7
token_auto_renew: false
