database:
  host: localhost
  port: 4000
  user: root
  password: 
  database: test

port: 4533 # should be 4533, but i have a server already running lol
web_port: 4534 # admin can be 0
sync_on_search: false
download: "getAlbum" # "getAlbum" (on album open), "play" (on stream), or "playAlbum" (on stream, then rest of album in bg)

storage:
  endpoint: localhost:7070 # versitygw s3 endpoint
  region: us-east-1
  access_key: aplsonic
  secret_key: aplsonic-secret
  bucket: aplsonic-music
  use_ssl: false
  download_codec: aac-web # gamdl --song-codec-priority

token_check_hours: 6 # how often the server re-validates Apple tokens (0 disables the monitor)
token_warn_days: 7   # flag tokens expiring within this many days
token_auto_renew: false # experimental, try auto renew tokens